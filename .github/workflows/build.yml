name: Build APK and Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'

      - run: flutter create --platforms=android --project-name gestion_financiere .
      - run: sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.24"/' android/settings.gradle.kts
      - run: sed -i '/android {/a\    ndkVersion = "27.0.12077973"' android/app/build.gradle.kts
      - name: Activer le core library desugaring (requis par flutter_local_notifications)
        run: |
          cat >> android/app/build.gradle.kts << 'EOF'

          android {
              compileOptions {
                  isCoreLibraryDesugaringEnabled = true
              }
          }

          dependencies {
              coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")
          }
          EOF
      - name: Ajout permission Internet et autorisation Wi-Fi local (synchronisation)
        run: |
          sed -i '/<manifest xmlns:android/a\    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/a\        android:usesCleartextTraffic="true"' android/app/src/main/AndroidManifest.xml
      - run: flutter pub get
      - run: flutter test
      - name: Build APK
        id: build_android
        run: flutter build apk --release > /tmp/build.log 2>&1
      - name: Publier l'erreur en commentaire (si échec)
        if: failure()
        run: |
          tail -c 60000 /tmp/build.log > /tmp/build_tail.log || true
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d "$(python3 -c 'import json,sys; print(json.dumps({"body":"BUILD LOG ANDROID:\n\`\`\`\n"+open("/tmp/build_tail.log").read()[-60000:]+"\n\`\`\`"}))')"

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'

      - run: flutter create --platforms=windows --project-name gestion_financiere .
      - run: flutter pub get
      - run: flutter build windows --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-windows
          path: build/windows/x64/runner/Release
