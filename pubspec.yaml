name: gestion_financiere
description: "Application personnelle de gestion financière - Bénin"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Gestion d'état + Injection de dépendances
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Base de données locale
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3     # nécessaire pour Windows/Linux/macOS
  path: ^1.9.0
  path_provider: ^2.1.3

  # Formatage devises / dates (utile pour le XOF et les autres devises)
  intl: ^0.20.2

  # Icônes modernes
  cupertino_icons: ^1.0.6

  # Typographie moderne (Inter — style fintech)
  google_fonts: ^6.2.1

  # Verrouillage par code PIN (stockage sécurisé du hash)
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.5

  # Graphiques (Bilans)
  fl_chart: ^0.69.0

  # Synchronisation Wi-Fi locale
  http: ^1.2.0

  # Export de relevés (PDF / CSV)
  pdf: ^3.11.1
  csv: ^6.0.0
  share_plus: ^7.2.2

  # Rappels (échéances crédits/dettes, dépassements de budget)
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Sauvegarde / restauration manuelle
  file_picker: ^8.1.2

  # Mémorisation des préférences (thème clair/sombre)
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/
